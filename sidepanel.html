<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Translator</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(160deg, rgba(14, 14, 26, 0.99), rgba(10, 10, 20, 1));
      color: #fff;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .ai-translator-result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      user-select: none;
      flex-shrink: 0;
    }
    
    .ai-translator-result-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
    }
    
    .ai-translator-logo {
      font-size: 18px;
    }
    
    .ai-translator-result-actions {
      display: flex;
      gap: 5px;
    }
    
    .ai-translator-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 8px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease;
      color: #fff;
      padding: 0;
    }
    
    .ai-translator-btn:hover {
      background: rgba(120, 90, 255, 0.18);
      border-color: rgba(120, 90, 255, 0.3);
      transform: scale(1.08);
    }
    
    .ai-translator-result-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: rgba(120, 90, 255, 0.25) transparent;
    }
    
    .ai-translator-result-body::-webkit-scrollbar { width: 5px; }
    .ai-translator-result-body::-webkit-scrollbar-track { background: transparent; }
    .ai-translator-result-body::-webkit-scrollbar-thumb { background: rgba(120, 90, 255, 0.25); border-radius: 10px; }
    
    /* Elements from content.css */
    .ai-translator-error-text {
      color: rgba(255, 120, 120, 0.9);
      font-size: 14px;
      line-height: 1.6;
      padding: 14px 18px;
      background: rgba(255, 90, 90, 0.05);
      border-radius: 10px;
      border: 1px solid rgba(255, 90, 90, 0.1);
      white-space: pre-wrap;
    }
    
    .ai-translator-streaming { margin-bottom: 16px; }
    .ai-translator-stream-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
      font-size: 12px; color: rgba(120, 90, 255, 0.7); font-weight: 600; letter-spacing: 0.5px;
    }
    .ai-translator-stream-indicator {
      width: 8px; height: 8px; border-radius: 50%; background: #785aff;
      animation: pulse 1s ease-in-out infinite; box-shadow: 0 0 8px rgba(120, 90, 255, 0.5);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .ai-translator-stream-text {
      color: rgba(255, 255, 255, 0.9); font-size: 14px; line-height: 1.75;
      padding: 14px 18px; background: rgba(120, 90, 255, 0.06);
      border: 1px solid rgba(120, 90, 255, 0.12); border-radius: 12px;
      white-space: pre-wrap; word-break: break-word; position: relative;
    }
    .ai-translator-stream-text::after {
      content: '▊'; color: #785aff; animation: blink 0.7s step-end infinite; font-weight: 400;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    
    .ai-translator-divider { border-top: 1px solid rgba(255, 255, 255, 0.06); margin: 20px 0; }
    .ai-translator-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .ai-translator-meta-model { background: rgba(120, 90, 255, 0.1); border: 1px solid rgba(120, 90, 255, 0.2); color: #a78bfa; padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
    .ai-translator-meta-tokens { background: rgba(52, 211, 153, 0.08); border: 1px solid rgba(52, 211, 153, 0.15); color: rgba(52, 211, 153, 0.8); padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
    .ai-translator-meta-mode { background: rgba(251, 191, 36, 0.08); border: 1px solid rgba(251, 191, 36, 0.15); color: rgba(251, 191, 36, 0.8); padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    
    .ai-translator-section { margin-bottom: 14px; }
    .ai-translator-section-header { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; color: rgba(255, 255, 255, 0.45); font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .ai-translator-section-icon { font-size: 13px; }
    .ai-translator-copy-section { margin-left: auto; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 5px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; transition: all 0.2s ease; padding: 0; color: #fff; }
    .ai-translator-copy-section:hover { background: rgba(120, 90, 255, 0.15); border-color: rgba(120, 90, 255, 0.3); }
    .ai-translator-section-content { color: rgba(255, 255, 255, 0.85); font-size: 14px; line-height: 1.75; padding: 12px 16px; border-radius: 10px; white-space: pre-wrap; word-break: break-word; }
    .ai-translator-original { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.55); font-style: italic; font-size: 13px; }
    .ai-translator-translated { background: rgba(120, 90, 255, 0.06); border: 1px solid rgba(120, 90, 255, 0.12); color: #fff; font-size: 15px; }
    .ai-translator-preview-img { max-width: 100%; max-height: 120px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.08); opacity: 0.75; transition: opacity 0.2s; }
    .ai-translator-preview-img:hover { opacity: 1; }

    .ai-translator-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }
    .ai-translator-empty span {
      font-size: 40px;
      margin-bottom: 15px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="ai-translator-result-header">
    <div class="ai-translator-result-title">
      <span class="ai-translator-logo">🌐</span>
      <span>AI Translator</span>
    </div>
    <div class="ai-translator-result-actions">
      <button class="ai-translator-btn ai-translator-btn-capture" title="Chụp lại (Alt+Q)">🔄</button>
      <button class="ai-translator-btn ai-translator-btn-save" title="Lưu File (.txt)">💾</button>
      <button class="ai-translator-btn ai-translator-btn-copy" title="Copy tất cả">📋</button>
      <button class="ai-translator-btn ai-translator-btn-trash" title="Xóa lịch sử">🗑️</button>
    </div>
  </div>
  <div class="ai-translator-result-body" id="result-body">
    <!-- Content goes here -->
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
